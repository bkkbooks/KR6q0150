body:
  text: 鍛鍊說十三篇自序鍛禪說而擬之孫武子何也以正治國以奇用兵柱下之言確矣佛法中據位者治叢林如治國用機法以鍛禪眾如用兵奇正相因不易之道也拈華一著兵法之祖西天四七東土二三雖顯理致暗合孫吳至馬駒蹴踏如光弼軍壁壘一變嗣後黃檗臨濟睦州雲門汾陽慈明東山圓悟諸老虗實殺活純用兵機逮乎妙喜專握竹篦大肆奇兵得人最盛五家建法各立綱宗韜略精嚴堅不可破而兵法全矣自元及明中葉鍛鍊法廢寒灰枯木坑陷殺人幸天童悟老人提三尺法劍開宗門疆土三峰藏老人繼之復綱宗重拈竹篦而鍛鍊復行陷陣衝鋒出眾龍象靈隱本師復加通變啐多方五花八門奇計錯出兵書益大備矣余昔居板首頗悟其法卜靜匡山逼住歐阜空拳赤手卒伍全無乃不辭杜撰創為隨眾經行敲擊移換擒斬劈之法一時大驗雖當場苦戰而奏凱多俘用兵離奇毒辣蓋至極矣因思人根無論利鈍苟得鍛法皆可省悟以人多執死法不垂手險崖雖有人材多悲鈍置遂不敢祕著為鍛禪之說流布宗門老師宿衲雖得此說未必能行矣豈惟不行或反嗤議初踞曲盝者其身英強其氣猛利依此兵符勤加操練必然省悟多人出大法將所願三玄戈甲永見雄強五位旌旗不致偃息知我罪我所弗惜焉則雖謂之禪門孫武子可也歲次辛丑孟春上元日住雲居晦山僧東吳願雲戒顯自識禪門鍛鍊說目次堅誓忍苦第一辨器授話第二入室搜刮第三落堂開導第四垂手鍛鍊第五機權䇿發第六寄巧回換第七斬關開眼第八研究綱宗第九精嚴操履第十磨治學業第十一簡練才能第十二謹嚴付授第十三
