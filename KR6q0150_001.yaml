body:
  text: 江西南康雲居山真如禪寺晦山戒顯著堅誓忍苦第一夫為長老者據佛祖之正位則應紹佛祖之家業作人天之師範則應開人天之眼目人天眼目者何佛性是已佛祖家業者何得人是已為長老而不能使眾生開悟佛性是謂盜名據正位而不能為佛祖廓人材是為竊位然欲使眾生開悟佛性則其心必苦非揣摩剝削曲盡機權則眾生佛性不能悟也欲為佛祖廓人材則其身必勞非勤勇奮厲痛下鍼錐則法門人材不能得也是故為長老者必先起大願立大誓然後顯大機發大用誓願者何初為長老即當矢之龍天籲之佛祖苟能使眾生開悟佛性則雖磨筋骨弊精神如鑿山開道竭其力而殉之不應辭也苟能為法門廓人材則雖彈朝夕忘寢食如嚙雪吞氈捍其苦而為之不應憚也思人世為父母者欲得賢子孫先之以修德積善廣行陰隲及得子也則襁褓之撫鞠之顧復之稍長也為之延師傅董藝業必積數十年勤苦然後成材其為心亦苦矣思武臣欲立功名於邊塞也必忘頂踵矢溝壑蒙霜露犯荊棘披堅執銳寢戈枕甲深入不毛身經百戰乃至墮指裂膚腹叢箭鏃萬死一生然後博一旦之功名其為身亦勞矣勞苦如此宜人人聞風而避望崖而退矣而盡古今人卒甘荼蓼而不恤蹈湯火而不辭者以所圖者大所倚者重而收功鉅也況為長老者道在津梁三有濟拔四生為從上佛祖增益慧命為大地眾生開鑿眼目此何等重任而顧愛惜勞苦出教子立武功者下哉既愛惜勞苦必深居端拱隔絕禪流養尊處優晏安自適等叢林於傳舍視禪眾如胡越冬期夏制祇了故文豈不上辜佛祖仰愧龍天下負師承為法門罪人也哉教中道菩薩為一眾生歷微塵劫受大勤苦終不疲厭今禪眾或數十或百或千機器當前豈止一人而已乎又云菩薩為眾生故捨頭目髓腦血肉手足遍滿大地積如須彌誓不以苦故退失大心況鍛鍊禪眾即勞筋苦骨飲冰茹蘗較之捨頭目血肉者縱什百千萬豈能及菩薩萬分之毫末乎既入此門孰不以知識自居既為長老孰不以佛祖自任處其位當行其事任其名當盡其實禪眾者實長老成佛之大資具也鍛鍊者實諸祖得人之大關鑰也不勤鍛鍊則必不能開眾生眼而得人不發誓願則必不肯為鍛鍊故而忍苦是故未陳鍛鍊之方先請堅發誓願誓願立而大本正矣故曰堅誓第一辨器授話第二欲鍛禪眾當示真參欲下鉗錘先辨機器臨濟曰我此閒作三種根器斷或奪境或奪人或奪法或俱奪或俱不奪此辨驗機器之大要也唐代禪風鼎盛機器不凡老古錐接人皆全機大用頓斷命根純用活機殊無死法至宋以後參禪用話頭而死法立矣然人至末法根器愈劣智巧愈深狂亂愈紛定慧愈淺主法者欲令禪眾開廓本有透脫牢關不得不用死法時代使然也然不善用則雖活法皆成死法能善用之則死法中自有活法活法者何辨機器是已禪眾入門先以目機銖兩定人材之高下次以探竿影草驗參學之淺深立主立賓一問一答絲來線去視其知有與否而人根見矣或上上機器來即以師子爪牙象王威猛拋金圈擲栗棘視其透關與否而把柄在師家矣人根既定方令進堂既進禪堂即應入室隨上中下機器而示以話頭其已歷諸方舊有話頭者或搜刮或移換或撥正雖事無一法然話頭正而定盤星在矣或曰有不用話頭竟以德山臨濟便棒便喝接人者如何曰奇則奇矣然視人根太高而不可槩用也有不論機器利鈍禪眾多少祇用一話頭而不變者何如曰均則均矣然視人根太混雖參而多不得益也請言其故不用話頭者誠直截痛快不帶廉纖矣然在昔人則可在今時則不可何故昔人根器高勝定慧力強一經名師大匠棒喝提持一信永信更無誵訛一徹永徹更無反覆所以可用今人以最深之智巧最紛之狂亂不用話頭重封密鎖痛劄深錐令情枯智竭驀地翻身而但用擊石火閃電光一著以為門庭縱或承當多屬光影而於言句關棙宗師血脈總未透以此號省悟將來反覆不可言矣故不可用非全不可用不可概用也老黃龍語晦堂曰若不看話頭百計搜尋令自見自肯即吾埋沒汝也豈不信哉止用一話頭者似平等簡徑不落揀擇矣然禪眾中生材有利鈍受氣有純駁信道有淺深參學有久暫買帽者當相頭著楔者須看孔自然之勢也宜數息者教令觀白骨宜觀骨者教令數息雖佛世不能證果況末法乎明大法者察氣候以下鉗錘識通變而施錐鑿三根皆利矣使不問利鈍純駁淺深久暫徒用一話頭以篐學者畫地而為牢釘樁而搖櫓高者抑而不能下卑者跂而不能至矣此所謂活法而成死法也妙喜曰善知識大法不明止以自證悟處指示人必瞎却人眼非此之謂乎然則指授話頭當用何法亦仍曰作三種根器斷而已矣初機參學者話大艱深必然杆格須令稍有咬嚼以發其根本氣宇英靈者話頭寬鬆易滋卜度須令壁立萬仞以斷其攀緣如萬法歸一父母未生前死了燒了等乃至目前一機一境雖智愚皆可用而初機為便南泉三不是大慧竹篦子道得道不得皆三十棒恁麼不恁麼總不是等雖高下皆可用而英靈為便更有擎頭戴角知見雄強者師家爪牙倍宜毒辣或機權喜怒以剷其命根或詰曲誵訛以去其祕蓄臨濟所謂全體半身獅子象王等皆為若輩而設此則視師家作用何如不可言傳也要之話頭雖多種不同皆須上截妙有關鎖既有關鎖學人用心時四門堵塞六路剿絕下截審問處其發疑情也必真疑情既真則擴悟機也必徹東山立盜父鎖櫃令子潰圍之喻非不傳之祕乎然亦有機器宜參荅語者如麻三觔乾矢橛青州布衫庭前柏樹子乃至狗子無佛性等亦有機器宜參機用者如入門便棒進門便喝睦州接雲門汾陽接慈明等往往發大悟門亦視師家用處何如耳無死法也閒有時師不知關棙止教人參如何是西來意如何是本來面目如何是學人自己者此則上無關鎖望空啟告師家下刀不緊學家發疑無力死水浮沈白首不悟坐病在此豈不惜哉最悞人者有初進禪門根本未悟遂令參南泉斬猫百丈野狐丹霞燒佛女子出定等話此真方木逗圓孔唐喪人光陰而天地懸隔者矣謂之杜撰不亦宜乎是故欲鍛鍊禪眾者審辨機器簡別話頭俾高下咸宜利鈍兼濟為入門第一大要事也入室搜刮第三既示話頭即當指令參究然參法有二一曰和平二曰猛利和平參者人難於省發即或有理會而出人必弱猛利參者人易於省發一入其爐鞴而出人必強此其故何也蓋參用和平則優柔絃緩止能抑其浮情汰其粗識久久成熟止棲泊於純清絕點而止叩關擊節必無冀矣故曰省發難也冷灰豆𪹼者縱十成無滲漏猶是平地死人一遇手脚毒辣荊棘門庭即冰消瓦解況能歷大事任大擔領大眾而不傾仄乎故曰出人弱也若欲求人啐地斷嚗地折猛𦦨裏翻身險崖中斷命能禁攧撲受敲磕而晏然不動者則非猛利參不可猛利雖勝恐力難長欲期尅日成功則非立限打七不可立限起七不獨健武英靈奮迅百倍即懦夫弱人一求入保社而心必死亦肯捐身而捨命矣故七不可以不限也若欲起七入室為先入室非虗文而已也長老既以鍛鍊為事則操心宜苦用意宜深立法宜嚴加功宜細欲至堂中先須識禪眾之號與貌與各各本參話頭然後可以垂手鍛鍊蓋不識其人雖聚首九旬事同陌路所謂結制者熱鬧門庭而已於禪眾無益也識其人矣而不諳其本參即長老落堂欲施逼拶其道無繇把柄既不在手於是禪門之通套出矣何謂通套冬夏禪制凡百委之執事執事堅守香規坐則任其昏散行則聽其寬疲長老有體非執事引磬敦請不落堂也即破例為眾者或一日二日而一落堂或三日五日而一落堂嬾者或十日半月甚至有終期不落堂者長老落堂肅列執事也如公府排衙掣籤唱名也如官吏點卯長老者既不識禪眾之號與貌又不知其本參話頭不得不垂一問頭舉一公案以塞其責此最惡套也其久歷禪席者滑機熟路隨身打點長老未至堂而意地丹黃腹稿已備長老又不用擒拏殺活綱宗手脚以搜其句意摟其窠臼止取滑頭應酬口角便利以為英靈纔一問及強撐一二語而卯過矣是則於老參似有益而實無益也其愚魯初參者禪書從未經目昏散尚未併除話頭苦未念熟長老下堂十有九人潛身遠立不敢近前縱或點著不鞫其本參而考以公案如向擔柴人問中書堂事頭定眼直苦捱一二棒而身脫矣是則於新參無益中之無益也長老應點已竟仍歸丈室而禪眾者又向妄想裏坐地死水裏浸殺不則昏散打攪過日而已求工夫上路百無一二也而況於徹悟乎此所謂通套也善知識以此通套為人逸則逸矣而禪眾曠大劫來業識何由廓清知見何由剿絕疑團何由破生死何由出哉此皆不識其人不知其本參之過也若欲知之其法在乎入室而搜刮蓋人根不齊參學有多種差別雖領話頭或無志參究或死心不得或有志而疑情發不起或纔舉話頭而妄想偏纏或參究累年而不解功夫為何事或援經教理路以配話頭或止借話頭而排遣妄想或以無事甲裏而自躲根或硬承當以為主宰或認泯默無縫以為徹證總緣無人撥正內無真疑致成多病皆當於入室時一一搜剔一一掃蕩與之解黏去縛斥滯磨昏斬其伴侶挾帶之絲砭其膏肓必死之疾指令真參而路頭必正矣苟不與搜刮淨盡儱侗授一話頭顢頇與一公案學家不善用心則欲正偏邪欲潔偏染欲明偏暗通身禪病而不可治矣是故長老於入室之際貴密地留心既可識其人號貌記其人本參又能去其禪病而導之正路鍛鍊之方漸漸可施矣落堂開導第四已經入室搜刮精當無錯路矣然學家參究如逆水行舟不得人以推挽則退多而進少又如臨河思跳不得人以慫慂則且前而易却是故堂中開導事為最急開導非三日五日一轉而已也要須一日三時勤勤開導開導之法當相其機宜觀其勤惰中其緩急事雖難定略言其端大約有四一曰悚立志二曰示參法三曰警疲怠四曰防魔病而所最忌者扯葛藤說道理何謂悚立志世閒藝業非立志堅強必不肯身受勤苦非受勤苦則必不能致精其業況斷情識明心性出生死成佛祖之大道乎是故欲下參究之初先令樹鐵石心發金剛誓以為前導寧骨斷筋枯非洞明大事不止也寧喪身捨命非徹透牢關不休也具此透脫生死堅固誓願則發疑情也必真辦此擔荷佛祖剛強志氣則下參究也必力疑情真參究力焉有不究竟徹悟者乎何為示參法古云大疑大悟小疑小悟不疑不悟故疑有十分斯悟有十分而世有教人死守話頭不起疑情者此參禪大病也盖參禪雖不可胡亂卜度而亦不可死守話頭但守話頭則所繫者枯樁所沈者死水所磨者刀背而已矣若非發起真疑機輪內轉即坐至驢年亦不得悟也學人喜行此路則沈空滯寂久之以窠臼為樂竟不信有悟矣師家喜以此教人則以枯木堂禪為極頭聞他家機下省發人必然生謗矣而孰知事大不然也蓋生死心切則生疑疑生悟故長老當禪眾靜坐須示令放下萬緣寸絲不掛將話頭上截關竅銳意研窮研窮無路然後併心下句盡力挨拶挨拶力竭從頭又起久久情識盡知見忘悟道易矣此不易之參法也何謂警疲怠參太平禪者從容和緩半浮半沈如水浸石無進無退即或苦參而工夫難於成片即或成片而卒急不得省悟以無人鞭䇿而激發也參猛利禪者人雖易省悟然正參時上根利智有進無退機器中下者猛利一回筋力倦怠易進而亦易退故須長老勤勤而鞭策也鞭策之法寧緊峭毋寬鬆寧毒辣毋平順寧斬釘截鐵毋帶水拖泥時時以苦言厲語痛處著錐苟有血性者必忿怒而向前矣何謂防魔病初機識性狂亂萬端所以開示話頭必須上截關鎖關鎖縝密搜剔精嚴意地邪思不能帶影學家所以止有悟道而無著魔也萬一師家不觀機器授話不重關鎖任其紛飛業識狂亂思惟則熟人熟境暗地奔騰異見異聞識田優亂初參學人無智慧以照破無道力以攝持或疑或怖或喜或悲突然竊發而魔事作矣魔事一作長老又無善巧為之療治祇用五處縶縛百千捶打往往至於喪身而殞命豈不悲哉所謂雖是善因而招惡果也若長老勤勤開導用意防閑則無此患矣至於致病多端不能備舉最易犯者無如迸氣胸前以為勇猛及灰心冷坐以求澄湛二者為甚也蓋參禪祕要祇在真實騰疑而不在乎迸氣自元代以來有邪師者多教人竪起脊梁咬定牙關緊捻雙拳高撐兩眼內實無真疑而外形猛狀日以硬氣迸塞胸膺其勢必至於心痛而咯血況如此死挺模樣亦豈可久之勢乎此大病一也其次坐冷禪者亦不起真疑死心參究一上禪牀惟萬端排遣消歸無事意想或生即以一口氣不來等話密念幾迴遂認四大非有萬法俱空灰心泯智澄湛不搖以為工夫極則勸令經行心慮打失寸步不移坐至歲深血脈不舒易成浮腫而亦多火證此實病在膏肓而世醫拱手者也欲除諸患存乎善知識不惜疲勞日至堂中勤行開導或發其堅志或示以真參或警其疲怠次則摧蕩其識情剗抹其知見掃除其岐路剿絕其病根則魔病眾患無從竊發而學人真悟不難冀矣垂手鍛鍊第五語曰不入虎穴爭得虎子為長老而不得鍛鍊之法雖龍象當前盡成廢器積數十年而不得一人省發也即有一个半个皆𡎺著磕著如蟲禦木偶爾成文而非鍛鍊之功也苟明鍛鍊雖中下資器逼拶有方如一期人廣可以省發數十人也妙喜鍛五十三人而悟十三輩圓悟金山一夕而省十八人雖語驚時聽而古今實有此事也何地無水不鑿則不溢何木石無火不鑽不擊則不發眾生具有佛性猶地之有水木石之有火不得善知識以妙密機用毒辣鉗錘疏之濬之敲之磕之而欲覬其桶底脫落自透牢關雖上上機器必望崖而返矣是故垂手鍛鍊不可不講也然真欲鍛鍊人材則長老必苦執事必勞禪制之中長老須時時在堂同眾起倒即不能然亦必三轉五轉在堂隨眾行坐鍛鍊之器在善用竹篦子蓋竹篦起自首山盛行於大慧再興於三峰此歷代老古錐鍛鍊衲子之器非創設也竹篦長須五尺闊止一寸稍稍模棱去其銳角即便捷而易用若夫拄杖子設法接機則可鍛鍊決不可用即用亦不靈也至於銅鐵如意以降禪眾而已稍近則頭迸腦裂非鍛鍊之物也用竹篦者其功便於逼拶而其妙在乎敲擊禪眾坐時則執之以巡香行時即握之為利器三板止靜長老必先開示如前所說不必瀆矣香安半炷即鳴引磬今禪眾經行經行之法先緩次急漸歸緊凑長老亦頻頻握竹篦隨眾旋繞當經行極猛利時即用兵家之法出其不意攻其無備或攔胸把住逼其下語或劈頭一棒鞫其本參待其出言復奪賊鎗而殺賊伺其轉變更將錐子而深錐雷崩電閃時莫今停囚長智結角羅紋處重為奪食驅耕或捨棒用掌而短兵相接或為此擊彼而閒道出奇或照用同時而矢石交攻或棒喝俱行而炮弩齊發工夫未極頭則千鎚而千鍊偷心未死盡則百縱而百擒務將學人曠大劫來識情影子知見葛藤摟其窟穴斬其根株使其無地躲根漸至懸崖撒手一錐一劄機候到者不難啐地斷嚗地折矣此非背水設陣中所謂置之死地而後生置之亡地而後存乎鍛鍊禪眾亦若是則已矣夫長老如是以為眾亦可謂難矣然得此道也則易於出人亦可謂妙矣天下事未有難而不妙者亦未有妙而不難者虎項而解其鈴龍頷而奪其珠乃至擒賊而得其王此皆極妙極難之事而走險出奇者未嘗乏人何獨法門而不然乎然天下主法者固守成規樂其簡易以為禪門格則如是定矣驟然聞余說者必非之曰此杜撰也焉有長老尊重日在禪堂與納子眉毛廝拄為此相攻相撲之事哉余曰此殆明於小而闇於大者也襲禪門通套而不用鍛鍊則長老者身逸而體尊善則善矣然終歲寂寞不省一人不惟佛祖之慧命無傳而門庭冷落身後斬然不旋踵而祖庭蔓草亦安見其有體也去禪門成格而勤加垂手則長老者體褻而身勞苦則苦矣然爐鞴雄強人材奮起不惟師承之擔子得脫而慧命有傳法門光大至暮年而愈見身安道隆亦安得謂之無體也以此較彼果孰得而孰失孰勝而孰劣哉況尫健在人修短有數長老必不以尊居丈室而益其齡亦必不以鍛鍊勞苦而減其算且舉眼茫茫長老遷謝宿草而拱木者不知其幾矣豈盡以鍛鍊之故哉是以垂手鍛鍊之法至迅至靈吾以比之穿楊箭神臂弓也閒有未盡者則更有䇿發回換斬關後三說在機權䇿發第六天下凡事利用順而獨禪門利用逆為人治事喜於善而鍛學人則喜於惡不惡不足以稱天下之大善也不逆不足以稱天下之大順也譬之天道霜之雪之雨露之恩所以溥也雷之霆之生成之德所以大也鍛鍊不用威則禪眾疲怠無由䇿發必不能使透關而徹悟䇿發不用權則嚴規肅矩祇成死法亦不能使憤厲而向前故鍛鍊一門事有千變而機用至活也善能使人省發者行坐定香不可太久坐太久則昏倦必生而話頭無力矣行太久則足力疲倦而坐便昏沈矣故禪門常規行坐必香一炷而余酌而中之短香可以一炷長香止用折半坐半炷則靜參必精彩稍欲倦而下單經行矣行半炷則動參必猛利足欲疲而抽解消息矣然參禪打七至時日稍久夜分過半禪眾漸趨倦怠為長老者以甘言誘之而不加勸也以和顏接之而不加厲也即䇿之以香板而模糊如故也此時欲作其氣賈其勇惟有奮大機權施大毒辣發大忿怒或閧堂詬罵或旋風捶打所謂多人憤恨語不可聽聞語如火燒心語崩崖裂石拋向面前而禪人之昏倦廓然立散矣譬之陰霾沈霧晻暍苦人迅霆一擊而句萌甲坼萬物怒生矣又如臨大壑對深濠安常處順千萬人不能跳越也大兵猛虎驅其後則一擲而過矣臨濟曰或把機權喜怒至汾陽慈明慣用此法也非所謂嫡骨相承者哉故善知識者其心至慈其用至毒所具者諸佛菩薩之心而所行者阿修羅王之事乃可以㧌動三有大城而不懼也無厭勝熱未嘗傷一蟲蟻而屠裂割剝窮刑極罰增人厭怖通此用者乃可為人抽釘拔楔敲枷打鎖不然則守死善道而已自救且不了而能為人乎大慧曰諸方說禪病無有過湛堂者只是為人時下刃不緊圓悟曰下手時須至苦至毒方始不虗付授也神仙祕訣父子不傳從上鍛鍊門庭類皆如此使不用此䇿發猶駕馬者止令伏櫪不加鞭影雖有驊騮騏驥追風天馬亦困鹽車矣安所得飛黃腰褭之用哉然則近世有通宵打七竟不放參者如何曰此法似極猛利而實最無益也蓋參禪打七原以期悟道而非之以遣睡魔若止以除瞌睡入火場煉魔足矣參禪保社不必進也真欲求省發者其喫緊處在中夜放參一睡次日方得志氣清明精神英爽發起真疑力求透脫不達此機死以捱香為事參不三日行則雲霧坐則醉夢昏沈之至也壓如泰山而所謂話頭者付之東流矣尚望其心華發明也哉豈惟參禪不得而昏沈中更加亂想著景發譫見鬼見神繇此出矣是謂不達方便之癡禪也經云邪師過謬非眾生咎豈不信哉故深明鍛鍊者通方便識機權遠過患而後可以為善知識也奇巧回換第七省發一也然機下透脫與冷地觸發其功用迥然不等冷地參究者就體消停不得善知識鉗錘移換每十年二十年而不得省發即或暗地點胷點肋至兩刃交鋒即出手不得機下透脫者其偷心必死疑根必盡解路必絕至險崖機下轉處得力而遊刃有餘是故從上古錐論悟道者必貴乎機下也馬祖百丈黃檗臨濟以至汾陽慈明東山圓悟大慧諸老皆大機大用電閃雷奔不可近傍一鎚一𡎺一捱拶一回換命根頓斷正眼洞明大龍大象雲興霧擁宗門斯鼎盛矣至元代以後列祖鍛鍊之法不行止貴死坐冷禪寒灰枯木古廟香爐冷啾啾地不動不搖以為得力反詆諸祖機用以為門庭施設黜五家綱宗為奇名異相牢籠學者而宗風遂大壞矣是故奪人奪境奪法臨濟七事不明左咬右咬咬去咬住巖頭活法不諳則必不能當機移換其法既失有請益者止有開示死話頭令其灰心冷坐相率入枯木堂習不語禪妙喜呵為默照邪禪者反室中祕授以為至寶傳至明葉此教盛行繇是走禪門者類以枯坐之久暫敘功夫之勝劣提著悟字如呼父名如犯國禁而參禪一法遂為葬送人根之地矣幸天童悟和尚以一棒闢其門庭而奮大機用三峰藏和尚以七事行其鍛鍊而究極綱宗本師靈隱禮和尚復以五家妙密多方通變而廣被羣機繇是料揀照用賓主回換之法復見於世而宗門日月赫然中興矣蓋學家參禪不得洞悟病有多端有扞格而不前者有廉纖而不斷者有死銜話頭而不起疑情者有沈坐冷灰而竟當本分者有認揚眉瞬目為全提者有執一言半句為了徹者有穿鑿公案為博通者有卜度綱宗為究竟者有一切剷抹為向上者有不上機境為獨脫者有以古今公案為分外枝節者有以最後牢關為強移換人者總因不經師匠不得真悟不透綱宗偏知異見舉起千差所貴善知識者因病與藥看孔下鍼如郢人削堊運斤成風如庖丁解牛披却導一機之下一句之閒能令學人枷鎖頓脫心眼洞開其法在於善用回換回換不一有法戰之回換有室中之回換有回換之回換有不回換之回換法戰回換者眾中逼拶學人出語有隙即攻有瑕即擊能返擲者更加以追蹤之句死機下者即示以活人之刀轉轆轆活卓卓務令學人無處立脚即與斷命根不難矣室中回換者學人或明前而不能明後或道頭而不知道尾或箭欲離弦但須一撥或泉將出竇止在一通長老不妨令其再問或代一語而即悟或更一字而廓然此神仙國手而最為奇巧者也回換之回換者佛性誰無別曰誰有而其僧即悟入門逢彌勒出門見達摩別曰入門逢甚麼出門見阿誰而其僧亦悟乃至胡張三黑李四昨日是今日不是等此回換之回換也不回換之回換者如何是曹源一滴水荅是曹源一滴水丙丁童子來求火無雲生嶺上有月落波心等但重舉一轉而前人即徹此雖不回換而亦回換也善知識者於是諸法如承蜩如弄丸如貫蝨發之而必應用之而無滯者何耶曰以能用綱宗而以活機接人故也得宗綱則料揀熟而回換得行手精眼快明辨來風一任旋乾而轉坤移星而換斗向上牢關可令人人透脫止重本體禪而不諳綱宗則前人一機一境橫拈竪弄死守膠盆長老無道以回換則藥汞銀禪得以假雞偷關竟過而悟不徹頭矣然則欲鍛鍊禪眾者綱宗所係豈細故哉斬關開眼第八回換固難矣至斬破重關開人眼目非鶻眼龍睛具弄大旗手脚者不能則尤難之難也當機衝突觀乎時節非其時則博浪之椎不宜舉也伏兵擊殺貴乎險隘不當隘則馬陵之弩不宜發也欲得斬關之訣其功存乎逼拶其奧在乎回換而其力則又係乎開導而䇿發不開導則行路或岐不䇿發則縱火不旺不逼拶則心智不絕不回換則賊情不窮四法不盡而求人之噴地省悟火未到而索飯果未熟而求脫雖負大名之長老具大器之學家惟機教不叩兩相辜負而已是故善鍛鍊者心不厭細功不厭繁事不厭周法不厭備長老同眾坐香今日如是開導明日如是䇿發則路頭必正而火力旺矣隨眾經行今日如是逼拶明日如是回換則心智必絕而賊情窮矣至於旺而加旺窮而更窮而所謂鶻眼龍睛殺活刀劍者可得而用矣有英年奇雋意氣雖盛強而參請日淺活而未能死者法當用殺有號稱老參工夫雖沈著而灰冷成病執而不能化者法當用活應殺而用活薄處擉破其禪不真往往易於承虗接響應活而又殺學人灰滅病在膏肓不應更於披枷帶鎖方其未悟也用殺者常十之九用活者止十之一以殺易施而活難用也然而又有殺活齊行者斯何人哉蓋有擎頭戴角具佛祖剛骨負龍象異姿而氣宇如王者纔見如此人來則羅網欲寬擒拏欲大機穽欲密鉤錐欲辣敲骨打髓捱至百尺竿頭痛劄深錐漸到懸崖撒手張弩力滿止在發機遇賊隘途不容眨眼當斯時也更無事䇿發無庸回換直須以殺活聖箭迅雷一擊緊峭言句頂門一劄桶底自脫命根立斷矣此猶推人於萬丈之崖而不能停也轉圓石於千仞之上而不可留也亦如金鍼之撥轉瞳神而立使光明也豈不異矣哉馬祖之接水潦睦州之接雲門大愚之接臨濟巖頭之接雪峰船子之接夾山汾陽之接慈明慈明之接黃龍大慧之接教忠西禪非用此道耶其餘見之燈錄載之傳記諸祖機用霆崩電激鳳翥龍騰烈烈轟轟照耀古今不可悉數何常教人止休去歇去坐死禪守冷竈不起疑情而將心待悟者為是耶高峰云工夫如轉石萬仞直墮深崖更無絲毫隔礙如此用心七日不悟妙上座永墮阿鼻地獄又何常必限人幾十年經冬過夏坐破蒲團守工夫窠臼以沈滯為極則者耶總之學家不遇鍛鍊即受盡茶苦費盡精神磨裩擦褲竭一生之力而透脫無門也師家不知鍛鍊即眼空四海氣吞諸方死守格套而不能垂手斬劈即開爐數十年而等閒不出人也即或明開導知䇿發諳接機愛惜長老體而不肯下身禪堂即至堂矣色身優養慣而不能隨眾經行驀加啐至於懸崖斷索之際又不能下斬關奪命之手以豁人心𮌎洞人眼目而咎天下之無人材其果無材耶抑有材而不知鍛鍊耶嗚呼有千里馬而不遇孫陽有楩楠文梓而不經良匠其為枉抑可勝道哉夫知有鍛鍊則省發不足奇既不用鍛鍊聞人家爐鞴或有省發則必生疑訕亦無足怪也語曰東家點燈西家暗坐因己之暗坐而概謂天下之燈燭庭燎盡無是事也豈理也哉是以斬關開眼極天下難事而奇功異用不可不知有此一法也研究綱宗第九夫所謂真禪者有根本有綱宗根本未悟而遽事綱宗則多知多解障塞悟門必流為提唱之禪而真悟亡矣根本既悟而撥棄綱宗則承虗弄影莾鹵成風必流為一橛之禪而宗旨滅矣是故未悟之綱宗不必有既悟之綱宗不可無也而世以顢頇儱侗為宗門者徒見世尊拈花商那竪指龍樹月輪伽耶持鑑乃至俱胝一指馬祖一踏雪峰毬禾山鼓黃檗三頓祕魔一杈等以為宗門大機大用直揵如此也孤峻如此也獨脫如此也曰此直指人心也不立文字也向上提持也更與言綱宗一字則呵為知解指為實法矣詆為葛藤絡索斥為滯名著相矣嗚呼孰知乃似是而大謬也世尊拈花誠直捷矣何故又曰吾有正法眼藏涅槃妙心實相無相微妙法門及傳法一偈種種言說乎曹溪本來無物誠孤峻矣何故五祖又云也未見性重徵至應無所住而生其心乃發大悟乎臨濟遭三頓痛棒至大愚肋下還拳誠獨脫矣何故創立七事惑亂後世乎雲門於推折足下廓然大悟矣睦州何故又指見雪峰溫研積諗授以宗印乎既一悟為是矣溫研者何事密授者何法乎洞山於雲巖無情說法得悟矣何故又傳寶鏡三昧立君臣偏正功勳等五位并三路三滲漏等種種細法乎乃至溈仰之三照三然燈十九門九十六圓相法眼之十玄六相等皆悟後建立者既一悟便了矣何故又增此枝蔓破壞直捷一路啟千萬世學家知解乎此必有說矣蓋參禪一法打頭喫緊在乎用已前鍛法使透根本根本既透又須知此一著之中有體有用其為體也有明有暗有背有面有左有右有頭有尾其為用也則有殺有活有擒有縱有推有扶有擡有搦就對機而言也則有君有臣有父有子有子有母有賓有主就賓主而言也有順成有爭分有暗合有互換有無賓主之賓主細而剖之則有有句無句無句中有句有句中無句有雙明有雙暗有同生有同死究而極之則有向上一機末後一句古人所謂始到牢關不通凡聖者是也臨濟有見乎此也乃於直捷之中立三句三玄三要以正其眼目建四料揀同喝四喝四照用四賓主分三種機器以盡其機用乃至五家立法各有門庭各有閫奧玄關金鎖百帀千重陷虎迷師當機縱奪如陰符太公之書不可窺也如五花八門之陣不可破也不如是不足以斷人命根而絕人知解也不如是則學家情關未透識鎖難開法見不消而通身窠臼也豈佛祖正法眼藏也哉或曰所貴乎禪者以不立文字不涉名言超然獨脫也今綱宗一立則名相紛煩楷成格則是增人情識益人知見而有實法可求也聰明者必穿鑿愚魯者益懞懂矣真悟道者何貴於此乎曰諸祖所以立綱宗者正為此也主人公禪自謂無情識而渾乎情識也自謂絕知見而純是知見也自謂無實法而認定一機一境恰墮實法也有臨濟七事五家宗旨用妙密鉗錘以鉤錐之料揀之剗削之而知見始消情識始破實法始忘矣窮盡萬法而不留一法是真直捷透盡諸門而不滯一門是真孤峻徹盡大法小法一切綱宗而罵除綱宗是真獨脫而豈守繫驢橛倚斷貫索弄無尾巴猢猻之謂哉譬之行路者歷九州四海遍名山大川而仍歸本處忘盡途中影子是真到家矣又譬之廣學者窮盡二酉蒐盡四庫穿貫天錄石渠之藏而胷不留一字是謂博通矣使足未離跬步而眼空四海毀天下之行遠者目未涉經史而空腹高心呵天下之讀書者雖三尺童子知其背謬矣但重根本而疑綱宗為葛藤為知見為實法者何以異是哉夫抹去綱宗者不但自己宗眼不了一當為人動便犯鋒傷手機境當前而不知踞頭收尾節角誵訛而不解抽爻換象掠虗弄滑而不能勘辨對打還拳而無法翦除徒恃鑑覺以為極則法門窠臼不可言矣然則悟後之綱宗又曷可少耶不見吉祥實悟後天衣懷問洞上五位君臣如何話會實曰我這裏一位也無衣曰這漢卻有箇見處柰不識宗旨何乃令五人齊喚實上座而密契奧旨妙喜曰金剛圈栗棘蓬直是難吞難透到此直下承當得了大法不明亦柰何不得又曰古人差別因緣大法一明舉起便會多見今人未有師承一見人說大法小法無不唾罵妙喜何故千言萬語吁嚀大法果妙喜杜撰耶抑今人自見不到而妄加批駁耶是故學家根本己明當依止師承溫研密諗務徹古人堂奧師家見學人已透根本更須以妙密鉗錘深錐痛劄務令透鋼宗眼目庶不至彼此承虗接響而正法眼藏得永遠而流傳矣精嚴操履第十向上一路千聖不傳如大火聚誰敢正眼而如塗毒鼓孰能側耳而聽機先掣電已屬遲疑句下精通猶為狂見此何事也而偲偲問操履踽踽論功勛哉然初祖云行解相應名之曰祖雲居膺祖曰那邊會得了卻向這邊行履涌泉曰見解人多行解人萬中無一則知從上諸祖未嘗以行解為二事也良以有行無解即操履精純不出階級縱有修為皆名癡福有解無行即見地超卓猶是擔板雖有悟門皆屬狂慧一者有目無足一者有尾無頭均之非究竟也為長老者務在鍛鍊人材料揀偏全權衡首尾欲令學人成始而成終果何道哉學家道眼未開先令參究以鍛其解敲骨打髓痛下鍼錐而行亘緩問所謂但貴子眼正不說子行履也大事既明即令操履以鍛其行鳥道玄路脚下無私而解始詣實所謂說得一丈不如行得一尺也然主法者不用鋼宗眼目微細勘人徒取一知半解遴選人材則俗禪中有二種岐路以主人公為禪者止認身田主宰動轉施為以為佛祖大機大用無順無逆一切皆是謂之作用是性由此儱侗習氣竊發遂至不擇飲啖不揀淨穢以為大道者矣有人規正則曰癡人佛性豈有二耶是謂以黐膠門而成魔業者也以豁達空為禪者止認本來無物泯默莽蕩以為自己安身立命無佛無祖一切皆空謂之向上巴鼻由此顢頇邪見得便遂至不避譏嫌不顧罪福而肆行無忌者矣有人呵諫則曰抖子猶有這箇在乎是謂以鐵鏟禪而滅因果者也此二者雖學者之謬而亦師家之過也以其不用綱宗鍛人而止取光影互相印授根器陋劣者遂生邪解而禍法門矣蓋師承正則學者之行解必端而遞代相承如以器傳器而源深流長矣師承不正則學者之行解必邪而相襲成風如烏焉成馬而積薄流卑矣何謂師承正道眼通徹而又重操履雖為長老凡事一同乎眾潔其身苦其志夙興而夜寐以勤苦先德為規繩而冰霜金玉道行內充叢林得以矜式斯之謂正也何謂師承不正道眼疎狂而心輕操履一居師位凡事不同乎眾美其饌蠶其衣早息而晏起以晏安鴆毒為灑落而持蠻執抝呵斥修行一眾無所取則斯之謂不正也所以自古至今佛法興盛第一等修行出於長老真宗澹薄第一等放逸亦出於長老長老重操履則龍天佑順四眾傾誠而佛法必盛長老棄行德則明致人譏幽招冥譴而佛法必衰蓋長老懷邪詭行固非一端而最異者行不踰庸人而以假氣魄作真佛法輒呵罵佛祖鞭撻鬼神而妄擬夫德山臨濟身現居博地而以因中人冐果地相每焚毀經像踐蹋聖賢而自比於丹霞佛照皓布裩無南泉歸宗大隨等之徹天眼目而信意殺傷自云龍象蹴踏無羅什寶誌布袋濟顛酒仙蜆子等之大權示現而妄飱酒肉以致破壞律儀殊不知古聖逆行有古聖之現相佛祖破執有佛祖之出身雖脫珍著敝換人眼睛帶水拖泥敲人枷鎖而隱聖現劣隨示神通帶果行因旋彰靈異何甞與癡闇夫凡行事同一顛倒而迷惑哉今荷擔法門者無古聖之神通而徒襲其迹無佛祖之靈異而但恣其貪豈非師蟲狐種自陷波旬退人正信而敗壞法門也哉凡此者皆因長老用罔以致法嗣效尤展轉流傳滋蔓魔業古云其父殺人其子必且行劫使省悟之後深入綱宗敦崇操履豈有是事哉溈山曰參學人雖從緣得一念頓悟自理猶有無始現業流識法當淨除晦堂曰余初入道自恃甚易退而自省矛盾極多遂力行三年方得事事如理乃至趙州四十年不雜用心香林四十年打成一片涌泉四十年尚有走作皆悟後事也先德非不知逆行順行為大人境界而勤苦操履至老而不倦者識法者懼也然則鍛鍊衲子使為後人標榜法門楷模精嚴行解蓋可忽乎哉磨治學業第十一大道不在言也非言無以顯道佛法不在學也非學無以明法真為生死者不能離名絕相叩己而參而馳騖義學棄本逐末則聰明不能敵業博洽豈免苦輪況學之為道深廣而靡竟賾奧而難窮儒者白首窮經猶苦不給況惜翦爪而求出世者哉然欲通宗教辨古今明綱宗識機用眼目後進決擇人天則學亦不可少也夫學有內有外內學者何滿龍宮盈海藏西天此土梵語唐言千七百則陳爛葛藤出世閒一切著述是也外學者何墳典丘索詩書六藝厔盩津逮之藏國門名山之業春秋史學諸子百家世閒一切典籍是也非內則本業不諳出世何以利生非外則儒術無聞入世不能應物使人謂禪家者流盡空疎而寡學闇鈍而無知何以抉佛祖心髓服天下緇素之俊傑哉或者曰向上一著迥絕名言世尊既明說不立文字教外別傳矣曹溪曰諸佛妙理非關文字藥山不說法曰經有經師論有論師爭怪得山僧今欲使人磨治學業必務貫穿名句粗識經史畋漁鉛槧播弄丹黃變禪門而成文字增知解而壞先宗必自此始矣余曰參學二字諸祖所立自有次第雖不可重學而棄參而亦不可單參而廢學也方其根本未明疑團未破根無利鈍皆須苦參正當參時剗盡名言截盡知見四面無門而鐵山橫路眉閒掛劍而血濺梵天留一元字脚襍毒入心眼中著屑矣學問云乎哉其參而得悟也撲破琉璃瓶放出遼天鶻葢天葢地而敲空作響透聲透色而枯木龍吟諸祖言句是甚盌鳴聲三乘教義是甚繫驢橛德山大悟乃云窮諸玄辯如一毫置於太虗竭世樞機似一滴投於巨壑使不撥置名言一回大死以求絕後再甦有如是廓徹如是奇特乎是則不可重學而棄參也逮乎疑團破矣根本明矣涅槃心易曉差別智難明古人有言矣即涅槃心中有無窮微細差別智內有無限誵訛諸祖機緣如連環鉤鎖五家宗旨如臥內兵符言意藏鋒金磨玉碾而不露有無交結蛛絲蟻跡而難通此豈僅當陽廓落止得一橛者謂一了百了一徹盡徹哉溫研積諗全恃乎學也況不為長老則已既欲居此位則質疑問難當與四眾䟽通偈頌言句徵拈別代法語等事當與學人點竄而開鑿此非可以胡亂而塞責也且三藏之鴻文義天浩瀚五部之戒法律海淵宏具在琅函傳之梵庋豈可束歸高閣但儱統而稱禪甘作生盲徒輕狂而傲物法門典籍是事糢糊治世語言通身黯黑叩以宗教則左支右吾諮以典章則面赤語塞開口則鳴同野干捫舌則醜類啞羊輒欲冐衣拂踞曲盝自稱楊鄭誑諕閭閻曰某宗某派也豈不慚愧殺人也哉禮曰言之無文行而不遠故鍛鍊衲子而膠柱一法者學家多不盡其能陶鑄人材而文采不兼者法門多不得其用盲人摸象全無鼻孔者無論矣鼻孔雖正而木吶無文者住靜則有餘利生則不足破瓶非器人品不端者無論矣人品雖端而幅幅寡學者但可與修持不可與扶竪此雖學家之資器有定而亦師家爐韛不寬之過也其最偏見者以曹溪不識字為護身見學人略究古今即呵為拋家亂走以德山解黏語為實法見同住稍研經教即罵為數寶算沙以長年死坐埋身鬼窟為真佛真法見從上知識稍有著述者即貶為知解宗徒由是天童雪竇永明佛印明教覺範妙喜中峰璉三生泉萬卷皆貶之為文字善知識矣豈不冤哉夫馬鳴龍樹何甞不造論而單傳直指為西天大祖曹溪雖示不識字而說法如雲金章玉句萬世取則乃借此躲根令後生初進荒唐廢學以至目不識丁亦可歎矣嗟乎天地閒文瀾學海奇才異能雖云閒氣然大龍大象佛祖其骨錦綉其𮌎者法門中亦自不絕即資器中下者善於裁成亦可通達所貴善知識因材而磨治先鍛其悟門次礱其學業俾有本有文有德有學出而播揚宗教砥柱頺流即法門不致掃地而老胡有望矣簡練才能第十二明教嵩曰尊莫尊乎道美莫美乎德道德者世出世閒之大寶不聞以才也有才而無德寧有德而無才世法且然況希佛祖出生死練神明歸寂滅者所學者何事而才能是問乎然安椎魯守拙撲鍵戶而寡營善一身則可而以主宰叢林綱紀衲子肩法門鉅任竪佛祖高幢非長才異能簡練有素烏能勝任而光大哉故治叢林不可以無才而亦不可有恃才之人恃才者進則為害非細故推其才又不可不論其德佛祖門庭非若世法用人得使貪使詐即跅弛之才泛駕之器可以權衡駕馭者也然其中最難者造物生人全才少偏才多才德相兼者少而不相兼者多視其人真誠厚重言規行矩好參學好修持其德足以服眾矣而舉以任事心跋前㚄後支左缺右而一籌莫展其所短者才也非德也視其才便捷敏給果敢向前能文雅能武健其才足以應變矣一授以事權則妒賢嫉能攪羣亂眾而無慝不露其所詘者德也非才也為長老者孰不重德而事又不可以不治孰不憐才而僨事者又不可以不去貴有道焉以陶鎔之成褫之琢磨之使剛柔皆可效用敏鈍總無廢材亦曰簡練以執事而已矣執事有大小有內外有左右有文武主宰叢林者缺一而不可百丈有見乎此也其建立清規也先定頭首十局而次及於列職若朝廷用人然星羅而碁布絲連而繩牽務令頭目相衛指臂相捍用之得其當而叢林整肅法道行矣此非故抑揚而高下之也因材分有良楛天資有厚薄能事有勝劣器量有寬窄一因其能而器使而人才當矣然叢林者又所以陶鎔人根變化氣質又不宜任其自然必多其爐韛拔其尤以厲眾汰其惰以懲餘賞罰分明而能事出矣此則治叢林之大綱不可紊亂者也其有頭角英異根本綱宗已明可望為種草者則簡練更當周備不可輕易放行也東序由下而上則悅眾以肅諷誦直歲以領眾務典座以主烹餁知庫以司會計副寺以助總理維那以飭堂規監院都寺以任院事稍不歷練紛煩現前必蕪廢而不治矣西序由卑而尊則侍者密邇長老或燒香或衣鉢或湯藥記錄書狀皆以便習學也而知客以職典謁知浴以興普行知藏以掌琅函書記以宰文墨而堂中板首則堂主後堂層累而上則西堂首座而四板首所職者則規矩佛法以佐長老鍛鍊禪眾以接來學而事乃大備矣古云不遇盤根錯節無以別利器縱有能人不歷執事何以陶鍊德器博綜智能非麤疎而任習即掣肘而無才以宰叢林安得不敗事而決裂哉況從上古錐欲磨厲人材也叢林務行無不命歷溈山古佛百丈命以典座雪峰大老德山委以飯頭乃至楊岐自寶庫司仰山雪竇知客雲峰化主五祖磨頭妙喜東司百靈知浴圓通知眾𢌞石監修權直歲匡桶頭洞山香燈大伯知隨陸沈下板率先苦行皆所以養其器老其材斧斤其質幹霜雪其筋骨使之任重致遠而柱石法門也獨至付授一事常不於列職而必於首座西堂者何哉既望其荷擔法門必能鍛鍊衲子方可利益方來既期以宰斷叢林必能哮吼當場不可紹續慧命若不於板首時熟鍊其鉗錘使牙爪毒辣推舉其秉拂使聲光靄著一旦居此位行此令豈能不捉衿而露肘哉嗟見近世法門不講鍛鍊急於收人衲子入門草草付授即或係執事不循資例輕易打發所至叢林輒曰某以侍者付矣某以知客付矣某以寮元直歲付矣乃至某某以禪眾付矣竟不命以典司試以盤錯舉以板首以利其牙爪鍊其才能蓄其聲問是事面牆而即打一印子明知軟弱而但搭一虗名不但誤天下蒼生而自弄自誑門庭倒蹋而不可扶矣何所取也哉亦知自古無易為之佛祖而亦無無能之長老長老者所以範人天統龍象為英靈標準為文武權衡則必有道德可以訓人而亦有才能可以治事雖潛行密用如愚若魯而一當大任則經緯剸割目無全牛豈非師家爐韛周正簡練於早也哉故鍛鍊初機冀其開眼莫善於敲擊鍛鍊老參期其成器莫精於簡練不由此道而望英賢輩起蹴踏祖庭縱或有僥倖而非常法矣語曰以不教民戰是謂棄之可為痛哭流涕長太息者此也謹嚴付授第十三鍛鍊之說既畢陳於前矣然欲善始善終則流傳宜慎何故苟有佛性則皆受鍛鍊既受鍛鍊則人可省發然人人可以省發而不必人人可付授也昔人云上根利智方可參禪余甞斥其言為非是蓋爐韛所以鎔鈍鐵良醫所以療病人不明鍛鍊雖上根利智皆成廢器況下此者乎善能鍛鍊雖鈍鐵病人亦成良材況上此者乎有心皆可以作佛有性皆可以悟道祇在善知識𭺗羅抉剔刮垢磨光垢盡明現如磨鏡喻今不咎鍛鍊之無方而概謂中下機器絕參學分此萬古不破之惑而余切齒者也然謂一經省發盡可付授此又知其一而不知其二也學家而至堪付授必其道眼可以繩宗祖行德可以範人天學識可以廸後進爪牙可以擒衲子然後命之以出世責之以為人如印傳印印文克肖而法門允賴矣即末法時代全杖難得異器難求亦必久久同住熟知心行縱不能超宗異目亦不至方底圓葢必有幾種擅長稍近繩墨者而後可即不能為長老而為靜主亦必道眼明入品正具佛祖剛骨而介自守不犯入苗稼者而後然斷非庸陋愚劣險詖邪僻之輩所宜插足者也然而法門至今日流弊不可勝言矣每見主法者徒守死法而不苦身鍛鍊則求人省發實難因省發者難求而又懼斷絕見一知半解者不得不急急付授此其故有二一者止貴根本不重綱宗無擒拏移換人手脚則一橛頭禪苟口角滑利者皆得偷關而過而下半截深細鍛鍊竟置之不問矣此儱統門頭所以易於付授也二者長老雖欲擇器竹篦下既不能出人而又不甘心寂寞明知外來生人一知半解無當於數而其勢不容留難稍一簡擇則其人必掉首而去矣此不知鍛鍊所以至於泛濫也以余言之易得者省發而顧難之如龜毛如兔角應難者付授而顧易之如起法名如納戒子豈不大顛倒哉誠欲望曹溪正脈源深而流長列祖慧命真傳而正授則於法嗣之行也宜囑而又囑令慎而更慎共堅其壁壘峻其隄防無令影響音聞者一傳再傳漸至潰圍而亂正則法門不至敗壞矣然則有前輩尊宿謹守關鑰至死而不付一人者如何曰此必善知識感憤時風矯枉過正萬不得已而然而亦非中道也佛祖慧命遞代相承傳流衣法為千萬世光明種子泛濫付授誠非而亦豈以畢竟斷絕為是不見世尊與西天列祖每當傳法必苦口曰傳示將來毋令斷絕乎但其閒或有人或無人或多付或少付各有定分不可矯強貴得其當而已馬祖出善知識八十四人各為宗主靡不當器後來稱人材極盛者為雲門為洞山為法眼為汾陽為黃龍南為真淨文為東山為圓悟為妙喜而妙喜付授世譜列九十餘人而未甞有人議諸老為濫付也其衣鉢單傳者如風穴如楊岐如白雲如應菴密菴等雖孤承七鬯寬能克家而亦未甞必以斷絕為高也如必以斷絕為高則四祖何必從廬阜而遠至牛頭乎南嶽何必磨甎船子何必覆舟風穴何必痛哭大陽何必以頂相皮履直裰寄浮山使求法器乎特以善知識行事或開張或守成或補救因時施設各有苦心不可輕議時方盛也佛祖挺生龍象聚集有智過於師者不則亦見與師齊者廣大門庭無一而非法器雖付數十人乃至百人而不為多法當開張不得而不開張也時方季也師家缺辨驗學者騖虗名有付數人而無一人當器者有付數十人而無一人周正出世老羊質虎皮彼此互相哄誘即付一人而亦已非於是真善知識寧令斷絕而走孤高以為補救法當補救不得而不補救也蓋開張之知識處其易補救之知識處其難易有易之功勳難亦有難之利益補救之知識雖云不付而中流砥柱道眼具存曠百世而光明洞然謂之斷絕可乎泛濫門庭雖則多付而日中灌瓜結果何在不轉眼而敗壞狼籍謂之接續可乎總之明綱宗知鍛鍊則初步不難出人悟後不輕放過謹慎與流傳皆為法門之幸毀綱宗忽鍛鍊則流傳有濫觴之過太慎又有斷絕之憂皆非法門之福雖然如是善知識者為佛祖入草求人為人天開鑿眼目寧慎無濫寧少而真毋多而偽無俾稂莠稊稗得以混亂嘉種則慧命必永遠而昌大矣故余苦口力陳鍛鍊而終之以囑慎流傳以為末後一句夫重綱宗勤鍛鍊持謹慎此三法者皆世所未聞而難行者也再三瀆此必觸忌諱然欲使正眼流通兒孫得力道必繇此語曰當言不避截舌孔子曰知我者其惟春秋乎罪我者其惟春秋乎余姑存此說以就正方來千百世下復有子雲者出必知子雲也禪門鍛鍊說䟦余實見晚近禪門死守成規不諳烹鍛每致真宗寂寥法流斷絕萬不獲已立為新法且作死馬醫若論本分一著言前薦得猶為滯殻迷封句下精通已是觸途狂見悟即不無爭柰落在第二頭汲汲乎講鉗鎚論鍛鍊豈非頭上安頭夢中說夢弄泥團漢將來認為實法不知通變帶累山僧生陷鐵圍矣躭源圓相倘遇仰山一火焚之山僧合掌云作家作家是真能善用孫武子而不為趙括談兵矣果有此人殆斫額望之也晦山叟復書於黃梅四祖方丈
